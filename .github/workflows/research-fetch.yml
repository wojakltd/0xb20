name: Research Feed Fetch

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      force_laboratory:
        description: "Force Laboratory X API sync even when the cache interval has not elapsed."
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: research-feed
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install research dependencies
        working-directory: research/backend
        run: npm ci --no-audit --no-fund

      - name: Install Chromium for Playwright
        working-directory: research/backend
        run: npx playwright install --with-deps chromium

      - name: Verify X API secret presence
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_API_BEARER_TOKEN: ${{ secrets.X_API_BEARER_TOKEN }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_API_BEARER_TOKEN: ${{ secrets.TWITTER_API_BEARER_TOKEN }}
          BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
          X_API_BEARER: ${{ secrets.X_API_BEARER }}
          TWITTER_BEARER: ${{ secrets.TWITTER_BEARER }}
          X_BEARER: ${{ secrets.X_BEARER }}
          X_API_TOKEN: ${{ secrets.X_API_TOKEN }}
        run: |
          if [ -n "$X_BEARER_TOKEN$X_API_BEARER_TOKEN$TWITTER_BEARER_TOKEN$TWITTER_API_BEARER_TOKEN$BEARER_TOKEN$X_API_BEARER$TWITTER_BEARER$X_BEARER$X_API_TOKEN" ]; then
            echo "X API bearer: loaded"
          else
            echo "::error::X API bearer: missing. Add repository secret X_BEARER_TOKEN in GitHub Actions secrets."
            exit 1
          fi

      - name: Fetch research feed
        working-directory: research/backend
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_API_BEARER_TOKEN: ${{ secrets.X_API_BEARER_TOKEN }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_API_BEARER_TOKEN: ${{ secrets.TWITTER_API_BEARER_TOKEN }}
          BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
          X_API_BEARER: ${{ secrets.X_API_BEARER }}
          TWITTER_BEARER: ${{ secrets.TWITTER_BEARER }}
          X_BEARER: ${{ secrets.X_BEARER }}
          X_API_TOKEN: ${{ secrets.X_API_TOKEN }}
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
          X_COOKIES_JSON: ${{ secrets.X_COOKIES_JSON }}
          X_COOKIE_HEADER: ${{ secrets.X_COOKIE_HEADER }}
          RESEARCH_FORCE_LABORATORY_SYNC: ${{ github.event_name == 'workflow_dispatch' && inputs.force_laboratory && '1' || '' }}
        run: npm run fetch

      - name: Inspect research cache
        working-directory: research/backend
        run: |
          node - <<'NODE'
          const feed = require('./cache/feed.json');
          const posts = Array.isArray(feed.posts) ? feed.posts : [];
          const laboratoryPosts = posts.filter((post) => post.username === '0xb20lol');
          const latest = laboratoryPosts[0] || {};

          console.log(`Research cache generated: ${feed.metadata && feed.metadata.generatedAt}`);
          console.log(`Research provider: ${feed.metadata && feed.metadata.provider}`);
          console.log(`Laboratory API status: ${feed.metadata && feed.metadata.apiStatus}`);
          console.log(`Laboratory posts: ${laboratoryPosts.length}`);
          console.log(`Latest Laboratory observation: ${latest.created_at || 'missing'} ${latest.id || ''}`);

          if (!laboratoryPosts.length) {
            throw new Error('Laboratory provider returned zero visible observations.');
          }
          NODE

      - name: Commit cache update
        id: commit_cache
        run: |
          if git diff --quiet -- research/backend/cache/feed.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Research cache unchanged."
            exit 0
          fi
          git config user.name "0XB20 Research Bot"
          git config user.email "actions@github.com"
          git pull --rebase --autostash origin main
          git add research/backend/cache/feed.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Research cache unchanged after rebase."
            exit 0
          fi
          git commit -m "Update research feed cache"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Vercel deploy
        if: steps.commit_cache.outputs.changed == 'true'
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "::warning::VERCEL_DEPLOY_HOOK_URL is missing. Cache was pushed, but production deploy was not triggered directly."
            exit 0
          fi

          curl --fail --show-error --silent --request POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "Vercel production deploy hook triggered after Research cache update."

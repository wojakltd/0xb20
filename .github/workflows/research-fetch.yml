name: Research Feed Fetch

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: research-feed
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install research dependencies
        working-directory: research/backend
        run: npm ci --no-audit --no-fund

      - name: Install Chromium for Playwright
        working-directory: research/backend
        run: npx playwright install --with-deps chromium

      - name: Verify X API secret presence
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_API_BEARER_TOKEN: ${{ secrets.X_API_BEARER_TOKEN }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_API_BEARER_TOKEN: ${{ secrets.TWITTER_API_BEARER_TOKEN }}
          BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
          X_API_BEARER: ${{ secrets.X_API_BEARER }}
          TWITTER_BEARER: ${{ secrets.TWITTER_BEARER }}
          X_BEARER: ${{ secrets.X_BEARER }}
          X_API_TOKEN: ${{ secrets.X_API_TOKEN }}
        run: |
          if [ -n "$X_BEARER_TOKEN$X_API_BEARER_TOKEN$TWITTER_BEARER_TOKEN$TWITTER_API_BEARER_TOKEN$BEARER_TOKEN$X_API_BEARER$TWITTER_BEARER$X_BEARER$X_API_TOKEN" ]; then
            echo "X API bearer: loaded"
          else
            echo "::error::X API bearer: missing. Add repository secret X_BEARER_TOKEN in GitHub Actions secrets."
            exit 1
          fi

      - name: Fetch research feed
        working-directory: research/backend
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_API_BEARER_TOKEN: ${{ secrets.X_API_BEARER_TOKEN }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_API_BEARER_TOKEN: ${{ secrets.TWITTER_API_BEARER_TOKEN }}
          BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
          X_API_BEARER: ${{ secrets.X_API_BEARER }}
          TWITTER_BEARER: ${{ secrets.TWITTER_BEARER }}
          X_BEARER: ${{ secrets.X_BEARER }}
          X_API_TOKEN: ${{ secrets.X_API_TOKEN }}
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
          X_COOKIES_JSON: ${{ secrets.X_COOKIES_JSON }}
          X_COOKIE_HEADER: ${{ secrets.X_COOKIE_HEADER }}
        run: npm run fetch

      - name: Commit cache update
        run: |
          if git diff --quiet -- research/backend/cache/feed.json; then
            echo "Research cache unchanged."
            exit 0
          fi
          git config user.name "0XB20 Research Bot"
          git config user.email "actions@github.com"
          git add research/backend/cache/feed.json
          git commit -m "Update research feed cache"
          git push

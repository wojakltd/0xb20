name: Feature request
description: Propose a new Laboratory improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What should the Laboratory improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Home
        - Archive
        - Research
        - AI Lab
        - Wallet tools
        - Token Sender
        - Documentation
        - Other
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Security, performance, design, or architecture constraints.

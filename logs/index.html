<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="0XB20 Laboratory Archive: a simple terminal history from the B20 Laboratory.">
  <meta name="b20-root" content="/">
  <title>0XB20 Laboratory Archive</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/effects.css">
</head>
<body class="archive-body">

<nav class="lab-nav" aria-label="B20 Laboratory modules">
  <a class="nav-brand" href="/">0XB20</a>
  <div class="nav-links">
    <a href="/#scanner" data-module-route="/scanner">Scanner</a>
    <a href="/#console" data-module-route="/console">Console</a>
    <a href="/logs/" data-module-route="/logs" aria-current="page">Logs</a>
    <a href="/research/" data-module-route="/research">Research</a>
    <a href="/#specimens" data-module-route="/specimens">Specimens</a>
    <a href="/evolution/" data-module-route="/evolution">Evolution</a>
    <a href="/#laboratory" data-module-route="/laboratory">Laboratory</a>
  </div>
</nav>

<main class="archive-page">
  <section class="archive-shell" data-reveal>
    <div class="archive-header">
      <div>
        <span class="eyebrow">Laboratory Archive</span>
        <h1>Terminal Logs</h1>
      </div>
    </div>

    <div class="archive-terminal" data-log-list aria-live="polite">
      <p class="panel-loading">Loading Laboratory Archive...</p>
    </div>
  </section>
</main>

<footer>
  <p>
    Built in public.
    Archive remains under observation.
  </p>
</footer>

<script src="/assets/js/config.js" defer></script>
<script src="/assets/js/data-loader.js" defer></script>
<script src="/assets/js/ui.js" defer></script>
<script src="/assets/js/logs-page.js" defer></script>

</body>
</html>
